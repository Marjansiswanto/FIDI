<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIDI SCIE — Portal Investasi Indonesia</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LAYAR LOGIN -->
  <div id="gate" class="scene">

    <!-- Panel dekoratif kiri: globe/network -->
    <div class="side-panel side-left" aria-hidden="true">
      <div class="globe-glow"></div>
      <svg class="globe-svg" viewBox="0 0 400 400">
        <circle cx="200" cy="200" r="150" class="globe-ring"/>
        <circle cx="200" cy="200" r="150" class="globe-ring globe-ring-2"/>
        <g class="globe-dots"></g>
        <g class="globe-lines"></g>
      </svg>
    </div>

    <!-- Panel dekoratif kanan: skyline + candlestick -->
    <div class="side-panel side-right" aria-hidden="true">
      <div class="skyline" id="skyline"></div>
      <svg class="chart-svg" viewBox="0 0 400 400" preserveAspectRatio="none">
        <polyline class="trend-line" points="20,360 70,320 60,300 110,260 100,240 150,210 140,190 190,150 180,130 230,95 220,80 270,55 260,40 320,20"/>
        <g class="candles" id="candles"></g>
      </svg>
    </div>

    <!-- Kartu login -->
    <main class="login-card">
      <div class="brand-row">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 60 60">
            <path d="M30 6 A24 24 0 0 1 54 30" class="arc arc-blue"/>
            <path d="M30 6 A24 24 0 0 0 8 22" class="arc arc-green"/>
          </svg>
        </span>
        <h1 class="brand-name"><span class="brand-fidi">FIDI</span> <span class="brand-scie">SCIE</span></h1>
      </div>

      <p class="brand-tagline">Smart Collaborative Investment Ecosystem</p>

      <div class="eyebrow-wrap">
        <p class="eyebrow">Portal Investasi Indonesia</p>
        <div class="eyebrow-divider"><span></span><i></i><span></span></div>
      </div>

      <form id="loginForm" novalidate>
        <label class="field">
          <span class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 2c-4.4 0-8 2.2-8 5v2h16v-2c0-2.8-3.6-5-8-5Z"/></svg>
          </span>
          <input type="text" id="usernameInput" placeholder="Username / Email" autocomplete="off">
        </label>

        <label class="field">
          <span class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M17 9V7a5 5 0 0 0-10 0v2a3 3 0 0 0-3 3v7a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-7a3 3 0 0 0-3-3Zm-8-2a3 3 0 1 1 6 0v2H9V7Z"/></svg>
          </span>
          <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
          <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Tampilkan password">
            <svg viewBox="0 0 24 24"><path d="M12 5c-5 0-9.3 3.1-11 7 1.7 3.9 6 7 11 7s9.3-3.1 11-7c-1.7-3.9-6-7-11-7Zm0 11.5A4.5 4.5 0 1 1 12 7.5a4.5 4.5 0 0 1 0 9Z"/></svg>
          </button>
        </label>

        <div class="field-row">
          <label class="remember">
            <input type="checkbox" id="rememberMe">
            <span>Ingat saya</span>
          </label>
          <button type="button" class="forgot-link" id="forgotBtn">Lupa password?</button>
        </div>

        <button type="button" id="loginBtn" class="login-btn">
          <svg viewBox="0 0 24 24" class="shield-icon"><path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3Zm0 2.2 6 2.2v4.6c0 4-2.7 7.6-6 8.9-3.3-1.3-6-4.9-6-8.9V6.4l6-2.2Z"/><path d="m10.8 13.4-2-2-1.4 1.4 3.4 3.4 6-6-1.4-1.4z"/></svg>
          LOGIN SECURELY
        </button>

        <p id="errorMsg" class="error"></p>
      </form>
    </main>

    <div class="ground-glow" aria-hidden="true"></div>
  </div>

  <!-- LAYAR KONTEN (SETELAH LOGIN) -->
  <div id="content" class="screen hidden">
    <header class="topbar">
      <span>FIDI SCIE — Portal Investasi Indonesia</span>
      <button id="logoutBtn">Keluar</button>
    </header>
    <div class="content-body" id="contentBody">
      <div class="placeholder-note">
        <h2>Konten analisis sedang disiapkan</h2>
        <p>Halaman analisis SCIE untuk sektor ritel Indonesia akan tampil di sini setelah datanya ditambahkan.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
